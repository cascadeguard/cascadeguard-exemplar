name: CI

'on':
  push:
    branches: [main]
    paths:
      - "images/**"
      - "images.yaml"
      - "shared/**"
      - ".github/workflows/**"
  pull_request:
    branches: [main]
    paths:
      - "images/**"
      - "images.yaml"
      - "shared/**"
      - ".github/workflows/**"

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  build:
