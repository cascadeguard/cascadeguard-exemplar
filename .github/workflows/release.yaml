name: Release

'on':
  push:
    tags:
      - "v*"

permissions:
  contents: write  # create GitHub Release
  packages: write
  id-token: write  # Cosign keyless signing

jobs:
  release-images:
    name: Release ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
            - name: hello-world
              context: local/hello-world
              dockerfile: local/hello-world/Dockerfile
              registry: ghcr.io
              image: cascadeguard/hello-world
              tag: "latest"
    uses: ./.github/workflows/build-image.yaml
    with:
      name: ${{ matrix.name }}
      context: ${{ matrix.context }}
      dockerfile: ${{ matrix.dockerfile }}
      registry: ${{ matrix.registry }}
      image: ${{ matrix.image }}
      tag: ${{ matrix.tag }}
      push: true
      sign: true
    secrets: inherit

  create-release:
    name: Create GitHub Release
    needs: release-images
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history for changelog

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            CHANGES=$(git log --pretty=format:"- %s (%h)" "$PREV_TAG"..HEAD)
          else
            CHANGES=$(git log --pretty=format:"- %s (%h)")
          fi
          echo "CHANGES<<EOF" >> "$GITHUB_OUTPUT"
          echo "$CHANGES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Build image list for release notes
        id: image-list
        run: |
          IMAGES=$(cat images.yaml | grep -E '^- name:|  image:|  tag:' | paste - - - | \
            sed 's/- name: //;s/  image: //;s/  tag: //' | \
            awk '{print "| `"$1"` | `ghcr.io/cascadeguard/"$2":"$3"` |"}')
          echo "IMAGES<<EOF" >> "$GITHUB_OUTPUT"
          echo "$IMAGES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: actions/github-script@v7
        env:
          CHANGES: ${{ steps.changelog.outputs.CHANGES }}
          IMAGES: ${{ steps.image-list.outputs.IMAGES }}
        with:
          script: |
            const tag = context.ref.replace('refs/tags/', '');
            const body = [
              `## Images`,
              ``,
              `| Name | Pull |`,
              `|------|------|`,
              process.env.IMAGES,
              ``,
              `## What's Changed`,
              ``,
              process.env.CHANGES,
              ``,
              `---`,
              `All images are signed with [Cosign](https://docs.sigstore.dev/cosign/overview/) keyless signing via Sigstore.`,
            ].join('\n');
            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: tag,
              body,
              draft: false,
              prerelease: tag.includes('-'),
            });
